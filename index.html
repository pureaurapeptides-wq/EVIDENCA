<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Evidenca prodaje</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:#111;color:#f0f0f0;font-family:'Inter',sans-serif}
.wrap{max-width:680px;margin:0 auto;padding:48px 24px 80px}
.top{margin-bottom:40px}
.date{font-size:13px;color:#888;letter-spacing:.04em;margin-bottom:8px}
.title{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:.05em;line-height:1;color:#fff}
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:48px}
.stat{background:#1a1a1a;border-radius:8px;padding:14px 12px}
.stat-label{font-size:11px;color:#555;letter-spacing:.08em;font-weight:500;margin-bottom:6px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.03em;line-height:1}
.stat-sub{font-size:11px;color:#555;margin-top:4px}
.divider{height:1px;background:#1e1e1e;margin:40px 0}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.section-name{font-size:11px;letter-spacing:.12em;color:#fff;font-weight:600}
.split{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.col{border:1px solid #1e1e1e;border-radius:10px;padding:1rem;min-height:80px}
.col-z{border-top:2px solid #378add}
.col-a{border-top:2px solid #4caf70}
.col-header{font-size:11px;font-weight:600;letter-spacing:.1em;margin-bottom:14px}
.col-z .col-header{color:#378add}
.col-a .col-header{color:#4caf70}
.row{padding:10px 0;border-bottom:1px solid #1a1a1a;font-size:13px}
.row:last-of-type{border-bottom:none}
.row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:3px}
.row-buyer{font-weight:500;color:#e8e8e8;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.row-items{font-size:12px;color:#555;margin-bottom:4px;line-height:1.5}
.row-price{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.03em}
.row-actions{display:flex;gap:3px;flex-shrink:0;margin-top:1px}
.col-total{font-size:11px;font-weight:600;letter-spacing:.06em;padding-top:10px;border-top:1px solid #1a1a1a;margin-top:6px}
.badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.06em;padding:1px 7px;border-radius:99px}
.b-done{background:#1a3a26;color:#6fcf97}
.b-pending{background:#3a2a10;color:#f2994a}
.b-shared{background:#1e1e3a;color:#7c7cef}
.shared-card{border:1px solid #1e1e1e;border-radius:10px;padding:1rem;margin-bottom:8px}
.shared-inner{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.shared-half{background:#181818;border-radius:6px;padding:10px 12px}
.shared-half-label{font-size:11px;color:#555;margin-bottom:4px;letter-spacing:.04em}
.shared-half-val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.03em}
.cost-row{padding:9px 0;border-bottom:1px solid #1a1a1a;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.cost-row:last-child{border-bottom:none}
.cost-label{color:#888;flex:1}
.cost-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#eb5757;letter-spacing:.03em}
.pov-table{width:100%;font-size:13px;border-collapse:collapse}
.pov-table td{padding:8px 0;border-bottom:1px solid #1a1a1a;vertical-align:middle}
.pov-table tr:last-child td{border-bottom:none}
.pov-label{color:#888}
.pov-val{text-align:right;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.03em}
.icon-btn{background:none;border:none;color:#333;cursor:pointer;padding:3px 5px;font-size:14px;line-height:1;transition:color .15s;border-radius:4px}
.icon-btn:hover{color:#aaa}
.icon-btn.danger:hover{color:#8b5a5a}
.icon-btn.success:hover{color:#6fcf97}
.add-btn{background:none;border:1px solid #2a2a2a;border-radius:6px;color:#555;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;cursor:pointer;padding:8px 14px;width:100%;margin-top:10px;transition:all .15s}
.add-btn:hover{border-color:#555;color:#fff}
.pri-btn{background:#fff;border:none;border-radius:6px;color:#111;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;cursor:pointer;padding:9px 16px;transition:background .15s}
.pri-btn:active{background:#ccc}
.add-form{margin-top:10px;background:#161616;border:1px solid #222;border-radius:8px;padding:12px}
.add-form-title{font-size:10px;letter-spacing:.1em;font-weight:600;color:#555;margin-bottom:10px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.form-grid.single{grid-template-columns:1fr}
.f-input{background:#111;border:1px solid #2a2a2a;border-radius:6px;padding:8px 10px;color:#f0f0f0;font-family:'Inter',sans-serif;font-size:13px;width:100%;outline:none;transition:border-color .15s}
.f-input::placeholder{color:#444}
.f-input:focus{border-color:#555}
.form-footer{display:flex;gap:7px;justify-content:flex-end;margin-top:4px}
.sec-btn{background:none;border:1px solid #2a2a2a;border-radius:6px;color:#555;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;cursor:pointer;padding:7px 12px;transition:all .15s}
.sec-btn:hover{border-color:#555;color:#fff}
.editable{cursor:pointer;border-bottom:1px dashed #333;transition:border-color .15s}
.editable:hover{border-color:#666}
.inline-input{background:transparent;border:none;border-bottom:1px solid #666;color:inherit;font-family:inherit;font-size:inherit;font-weight:inherit;outline:none;width:100%;padding:1px 0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:auto}
.modal{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:24px;width:100%;max-width:340px;margin:16px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.05em;margin-bottom:16px}
.modal-field{margin-bottom:10px}
.modal-label{font-size:11px;color:#555;letter-spacing:.06em;font-weight:600;margin-bottom:5px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:#222;border:1px solid #333;border-radius:8px;padding:12px 20px;font-size:13px;color:#ccc;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.show{opacity:1}
.empty-msg{font-size:13px;color:#333;font-style:italic;padding:8px 0}
.c-green{color:#6fcf97}.c-amber{color:#f2994a}.c-red{color:#eb5757}.c-white{color:#fff}.c-blue{color:#378add}.c-teal{color:#4caf70}
@media(max-width:480px){
  .summary-row{grid-template-columns:repeat(2,1fr)}
  .title{font-size:48px}
  .split{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="date" id="top-date"></div>
    <div class="title">Evidenca<br>Prodaje</div>
  </div>
  <div class="summary-row">
    <div class="stat"><div class="stat-label">NABAVA</div><div class="stat-val c-white" id="s-nabava">—</div><div class="stat-sub" id="s-nabava-sub">pol Žiga / pol Aljaž</div></div>
    <div class="stat"><div class="stat-label">PRODANO</div><div class="stat-val c-green" id="s-prodano">—</div><div class="stat-sub" id="s-prodano-sub">—</div></div>
    <div class="stat"><div class="stat-label">ODPRTO</div><div class="stat-val c-amber" id="s-odprto">—</div><div class="stat-sub" id="s-odprto-sub">—</div></div>
    <div class="stat"><div class="stat-label">NETO (po vseh)</div><div class="stat-val c-green" id="s-neto">—</div><div class="stat-sub">ko vse zapremo</div></div>
  </div>
  <div class="section-header">
    <span class="section-name">VLOŽKI</span>
    <button class="sec-btn" onclick="openModal('cost')">+ DODAJ VLOŽEK</button>
  </div>
  <div class="split">
    <div class="col col-z"><div class="col-header">ŽIGA</div><div id="costs-ziga"></div><div class="col-total c-red" id="total-cost-ziga"></div></div>
    <div class="col col-a"><div class="col-header">ALJAŽ</div><div id="costs-aljaz"></div><div class="col-total c-red" id="total-cost-aljaz"></div></div>
  </div>
  <div class="divider"></div>
  <div class="section-header"><span class="section-name">ZAKLJUČENE PRODAJE</span></div>
  <div class="split">
    <div class="col col-z"><div class="col-header">ŽIGA</div><div id="zakljucene-ziga"></div><div class="col-total c-blue" id="total-z-ziga"></div></div>
    <div class="col col-a"><div class="col-header">ALJAŽ</div><div id="zakljucene-aljaz"></div><div class="col-total c-teal" id="total-z-aljaz"></div></div>
  </div>
  <div id="shared-section"></div>
  <div class="divider"></div>
  <div class="section-header"><span class="section-name">ODPRTA NAROČILA</span></div>
  <div class="split">
    <div class="col col-z">
      <div class="col-header">ŽIGA</div>
      <div id="odprta-ziga"></div>
      <div class="col-total c-amber" id="total-o-ziga"></div>
      <div id="form-ziga" style="display:none"></div>
      <button class="add-btn" id="btn-ziga" onclick="toggleForm('ziga')">+ DODAJ NAROČILO</button>
    </div>
    <div class="col col-a">
      <div class="col-header">ALJAŽ</div>
      <div id="odprta-aljaz"></div>
      <div class="col-total c-amber" id="total-o-aljaz"></div>
      <div id="form-aljaz" style="display:none"></div>
      <button class="add-btn" id="btn-aljaz" onclick="toggleForm('aljaz')">+ DODAJ NAROČILO</button>
    </div>
  </div>
  <div class="divider"></div>
  <div class="section-header">
    <span class="section-name">ZALOGA</span>
    <button class="sec-btn" onclick="openModal('stock')">+ DODAJ ARTIKEL</button>
  </div>
  <div id="zaloga-wrap" style="border:1px solid #1e1e1e;border-radius:10px;overflow:hidden"></div>
  <div class="divider"></div>
  <div class="section-header"><span class="section-name">POVZETEK</span></div>
  <div class="split">
    <div class="col col-z">
      <div class="col-header">ŽIGA</div>
      <table class="pov-table">
        <tr><td class="pov-label">Nabava</td><td class="pov-val c-red" id="pov-z-cost">—</td></tr>
        <tr><td class="pov-label">Zaključeno</td><td class="pov-val c-blue" id="pov-z-done">—</td></tr>
        <tr><td class="pov-label">Neto trenutno</td><td class="pov-val" id="pov-z-net">—</td></tr>
        <tr><td class="pov-label">Odprto</td><td class="pov-val c-amber" id="pov-z-open">—</td></tr>
        <tr><td class="pov-label" style="color:#e8e8e8;font-weight:500">Neto po vseh</td><td class="pov-val" id="pov-z-total">—</td></tr>
      </table>
    </div>
    <div class="col col-a">
      <div class="col-header">ALJAŽ</div>
      <table class="pov-table">
        <tr><td class="pov-label">Nabava</td><td class="pov-val c-red" id="pov-a-cost">—</td></tr>
        <tr><td class="pov-label">Zaključeno</td><td class="pov-val c-teal" id="pov-a-done">—</td></tr>
        <tr><td class="pov-label" style="color:#e8e8e8;font-weight:500">Neto trenutno</td><td class="pov-val" id="pov-a-net">—</td></tr>
      </table>
    </div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-title" id="modal-title">—</div>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="sec-btn" onclick="closeModal()">Prekliči</button>
      <button class="pri-btn" onclick="modalConfirm()">SHRANI</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const DAYS=['Nedelja','Ponedeljek','Torek','Sreda','Četrtek','Petek','Sobota'];
const MON=['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Avg','Sep','Okt','Nov','Dec'];
const nd=new Date();
document.getElementById('top-date').textContent=DAYS[nd.getDay()]+' · '+MON[nd.getMonth()]+' '+nd.getDate()+', '+nd.getFullYear();

let S={costs:[],completed:[],orders:[],stock:[]};
let idCounter=Date.now();
function uid(){return 'id'+(idCounter++);}

// ─── API ───
async function api(path,opts={}){
  const res=await fetch(path,{headers:{'Content-Type':'application/json'},...opts});
  if(!res.ok) throw new Error(res.status);
  return res.json();
}

async function loadAll(){
  const [costs,completed,orders,stock]=await Promise.all([
    api('/api/costs'),api('/api/completed'),api('/api/orders'),api('/api/stock')
  ]);
  S={costs,completed,orders,stock};
  render();
}

// ─── toast ───
let tt;
function toast(msg){clearTimeout(tt);const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');tt=setTimeout(()=>t.classList.remove('show'),2500);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sign(n){return n>=0?'+':'';}

// ─── RENDER ───
function render(){renderCosts();renderCompleted();renderShared();renderOrders();renderStock();renderSummary();}

function renderCosts(){
  ['ziga','aljaz'].forEach(sel=>{
    const items=S.costs.filter(c=>c.seller===sel);
    document.getElementById('costs-'+sel).innerHTML=items.map(c=>`
      <div class="cost-row">
        <span class="cost-label editable" onclick="editField(this,'costs','label','${c.id}',false)">${esc(c.label)}</span>
        <span class="cost-val editable" onclick="editField(this,'costs','amount','${c.id}',true)">${c.amount!=null?'−'+c.amount+' €':'—'}</span>
        <button class="icon-btn danger" onclick="del('costs','${c.id}')">×</button>
      </div>`).join('')||'<div class="empty-msg">—</div>';
    const total=items.reduce((a,c)=>a+(c.amount||0),0);
    document.getElementById('total-cost-'+sel).textContent=total?'SKUPAJ: −'+total+' €':'';
  });
}

function renderCompleted(){
  ['ziga','aljaz'].forEach(sel=>{
    const items=S.completed.filter(c=>c.seller===sel);
    document.getElementById('zakljucene-'+sel).innerHTML=items.length?items.map(c=>`
      <div class="row">
        <div class="row-top">
          <div class="row-buyer">
            <span class="editable" onclick="editField(this,'completed','buyer','${c.id}',false)">${esc(c.buyer)}</span>
            <span class="badge b-done">PLAČANO</span>
            ${c.shared?'<span class="badge b-shared">POL/POL</span>':''}
          </div>
          <div class="row-actions"><button class="icon-btn danger" onclick="del('completed','${c.id}')">×</button></div>
        </div>
        <div class="row-items editable" onclick="editField(this,'completed','items','${c.id}',false)">${esc(c.items)||'—'}</div>
        <div class="row-price ${sel==='ziga'?'c-blue':'c-teal'} editable" onclick="editField(this,'completed','price','${c.id}',true)">${c.price} €</div>
      </div>`).join(''):'<div class="empty-msg">—</div>';
    const total=items.reduce((a,c)=>a+c.price,0);
    document.getElementById('total-z-'+sel).textContent=total?'SKUPAJ: '+total+' €':'';
  });
}

function renderShared(){
  const pairs={};
  S.completed.filter(c=>c.shared).forEach(c=>{
    const key=[c.seller,c.sharedWith].sort().join('-');
    if(!pairs[key]) pairs[key]={};
    pairs[key][c.seller]=c;
  });
  document.getElementById('shared-section').innerHTML=Object.values(pairs).map(p=>{
    const z=p.ziga,a=p.aljaz;
    const buyer=z?z.buyer:a?a.buyer:'—';
    const items=z?z.items:a?a.items:'—';
    const total=(z?z.price:0)+(a?a.price:0);
    return `<div class="shared-card">
      <div class="section-header" style="margin-bottom:0">
        <span class="section-name">SKUPNA PRODAJA — ${esc(buyer)} <span class="badge b-done" style="vertical-align:middle">PLAČANO</span></span>
      </div>
      <div style="font-size:12px;color:#555;margin-top:6px">${esc(items)} · skupaj ${total} €</div>
      <div class="shared-inner">
        <div class="shared-half"><div class="shared-half-label">ŽIGA (POL)</div><div class="shared-half-val c-blue">${z?z.price+' €':'—'}</div></div>
        <div class="shared-half"><div class="shared-half-label">ALJAŽ (POL)</div><div class="shared-half-val c-teal">${a?a.price+' €':'—'}</div></div>
      </div>
    </div>`;
  }).join('');
}

function renderOrders(){
  ['ziga','aljaz'].forEach(sel=>{
    const items=S.orders.filter(o=>o.seller===sel);
    document.getElementById('odprta-'+sel).innerHTML=items.length?items.map(o=>`
      <div class="row">
        <div class="row-top">
          <div class="row-buyer">
            <span class="editable" onclick="editField(this,'orders','buyer','${o.id}',false)">${esc(o.buyer)}</span>
            <span class="badge b-pending">ČAKA</span>
          </div>
          <div class="row-actions">
            <button class="icon-btn success" onclick="completeOrder('${o.id}')" title="Zaključi">✓</button>
            <button class="icon-btn danger" onclick="del('orders','${o.id}')">×</button>
          </div>
        </div>
        <div class="row-items editable" onclick="editField(this,'orders','items','${o.id}',false)">${esc(o.items)||'—'}</div>
        <div class="row-price c-amber editable" onclick="editField(this,'orders','price','${o.id}',true)">${o.price} €</div>
      </div>`).join(''):'<div class="empty-msg">—</div>';
    const total=items.reduce((a,o)=>a+o.price,0);
    document.getElementById('total-o-'+sel).textContent=total?'ODPRTO: '+total+' €':'';
  });
}

function renderStock(){
  const el=document.getElementById('zaloga-wrap');
  if(!S.stock.length){el.innerHTML='<div class="empty-msg" style="padding:14px">—</div>';return;}
  el.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:13px">
    <thead><tr style="background:#181818">
      <th style="padding:10px 14px;text-align:left;font-size:10px;letter-spacing:.1em;color:#555;font-weight:600">ARTIKEL</th>
      <th style="padding:10px 14px;text-align:right;font-size:10px;letter-spacing:.1em;color:#555;font-weight:600">SKUPAJ</th>
      <th style="padding:10px 14px;text-align:right;font-size:10px;letter-spacing:.1em;color:#555;font-weight:600">PRODANO</th>
      <th style="padding:10px 14px;text-align:right;font-size:10px;letter-spacing:.1em;color:#555;font-weight:600">OSTALO</th>
      <th style="padding:10px 14px;width:40px"></th>
    </tr></thead>
    <tbody>${S.stock.map(s=>`
      <tr style="border-top:1px solid #1e1e1e">
        <td style="padding:10px 14px;color:#e8e8e8" class="editable" onclick="editField(this,'stock','name','${s.id}',false)">${esc(s.name)}</td>
        <td style="padding:10px 14px;text-align:right;color:#555" class="editable" onclick="editField(this,'stock','total','${s.id}',true)">${esc(s.total)}</td>
        <td style="padding:10px 14px;text-align:right;color:#eb5757" class="editable" onclick="editField(this,'stock','sold','${s.id}',false)">${esc(s.sold)}</td>
        <td style="padding:10px 14px;text-align:right;color:#6fcf97;font-weight:500" class="editable" onclick="editField(this,'stock','left','${s.id}',false)">${esc(s.left_amt)}</td>
        <td style="padding:10px 14px;text-align:right"><button class="icon-btn danger" onclick="del('stock','${s.id}')">×</button></td>
      </tr>`).join('')}
    </tbody></table>`;
}

function renderSummary(){
  const costZ=S.costs.filter(c=>c.seller==='ziga').reduce((a,c)=>a+(c.amount||0),0);
  const costA=S.costs.filter(c=>c.seller==='aljaz').reduce((a,c)=>a+(c.amount||0),0);
  const doneZ=S.completed.filter(c=>c.seller==='ziga').reduce((a,c)=>a+c.price,0);
  const doneA=S.completed.filter(c=>c.seller==='aljaz').reduce((a,c)=>a+c.price,0);
  const openZ=S.orders.filter(o=>o.seller==='ziga').reduce((a,o)=>a+o.price,0);
  const openA=S.orders.filter(o=>o.seller==='aljaz').reduce((a,o)=>a+o.price,0);
  const nabava=costZ+costA,totalDone=doneZ+doneA,totalOpen=openZ+openA,neto=totalDone+totalOpen-nabava;
  document.getElementById('s-nabava').textContent=nabava+' €';
  document.getElementById('s-prodano').textContent=totalDone+' €';
  document.getElementById('s-odprto').textContent=totalOpen+' €';
  document.getElementById('s-odprto-sub').textContent=S.orders.length+' naročil';
  document.getElementById('s-neto').textContent=sign(neto)+neto+' €';
  document.getElementById('s-neto').className='stat-val '+(neto>=0?'c-green':'c-red');
  const zNet=doneZ-costZ,zTotal=zNet+openZ,aNet=doneA-costA;
  document.getElementById('pov-z-cost').textContent='−'+costZ+' €';
  document.getElementById('pov-z-done').textContent=doneZ+' €';
  document.getElementById('pov-z-net').textContent=sign(zNet)+zNet+' €';
  document.getElementById('pov-z-net').className='pov-val '+(zNet>=0?'c-green':'c-red');
  document.getElementById('pov-z-open').textContent=openZ?'+'+openZ+' €':'0 €';
  document.getElementById('pov-z-total').textContent=sign(zTotal)+zTotal+' €';
  document.getElementById('pov-z-total').className='pov-val '+(zTotal>=0?'c-green':'c-red');
  document.getElementById('pov-a-cost').textContent='−'+costA+' €';
  document.getElementById('pov-a-done').textContent=doneA+' €';
  document.getElementById('pov-a-net').textContent=sign(aNet)+aNet+' €';
  document.getElementById('pov-a-net').className='pov-val '+(aNet>=0?'c-green':'c-red');
}

// ─── inline edit ───
function editField(el,table,field,id,isNum){
  if(el.querySelector('input')) return;
  let val=el.textContent.trim().replace(/ €$/,'').replace(/^−/,'');
  if(val==='—') val='';
  const inp=document.createElement('input');
  inp.className='inline-input';inp.value=val;inp.type=isNum?'number':'text';
  el.innerHTML='';el.appendChild(inp);inp.focus();inp.select();
  let done=false;
  async function commit(){
    if(done) return;done=true;
    let nv=inp.value.trim();
    const item=S[table].find(x=>x.id===id);
    if(!item){render();return;}
    if(isNum) item[field]=nv===''?null:parseFloat(nv)||0;
    else item[field]=nv;
    render();
    // patch api
    const body={[field]:item[field]};
    // map 'left' to 'left_amt' for stock display but send as 'left'
    await api('/api/'+table+'/'+id,{method:'PATCH',body:JSON.stringify(body)}).catch(()=>toast('Napaka pri shranjevanju'));
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();commit();}
    if(e.key==='Escape'){done=true;render();}
  });
}

// ─── delete ───
async function del(table,id){
  const arr=S[table];
  const item=arr.find(x=>x.id===id);
  S[table]=arr.filter(x=>x.id!==id);
  render();
  await api('/api/'+table+'/'+id,{method:'DELETE'}).catch(()=>{S[table].push(item);render();toast('Napaka');});
  if(item) toast('Izbrisano');
}

// ─── complete order ───
async function completeOrder(id){
  const o=S.orders.find(x=>x.id===id);
  if(!o) return;
  const nid=uid();
  const nc={id:nid,seller:o.seller,buyer:o.buyer,items:o.items,price:o.price,shared:false,sharedWith:null};
  S.completed.push(nc);
  S.orders=S.orders.filter(x=>x.id!==id);
  render();
  await Promise.all([
    api('/api/completed',{method:'POST',body:JSON.stringify(nc)}),
    api('/api/orders/'+id,{method:'DELETE'})
  ]).catch(()=>toast('Napaka pri shranjevanju'));
  toast('Zaključeno — '+o.buyer+' ('+o.price+' €)');
}

// ─── add order form ───
function toggleForm(seller){
  const fd=document.getElementById('form-'+seller);
  const btn=document.getElementById('btn-'+seller);
  const open=fd.style.display==='none';
  if(open){
    fd.innerHTML=`<div class="add-form">
      <div class="add-form-title">NOVO NAROČILO — ${seller.toUpperCase()}</div>
      <div class="form-grid">
        <input class="f-input" id="nf-${seller}-buyer" placeholder="Kupec" autocomplete="off">
        <input class="f-input" id="nf-${seller}-price" placeholder="Znesek (€)" type="number" min="0">
      </div>
      <div class="form-grid single">
        <input class="f-input" id="nf-${seller}-items" placeholder="Artikli" autocomplete="off">
      </div>
      <div class="form-footer">
        <button class="sec-btn" onclick="toggleForm('${seller}')">Prekliči</button>
        <button class="pri-btn" onclick="submitOrder('${seller}')">DODAJ →</button>
      </div>
    </div>`;
    fd.style.display='block';btn.style.display='none';
    document.getElementById('nf-'+seller+'-buyer').focus();
  } else {fd.style.display='none';fd.innerHTML='';btn.style.display='block';}
}

async function submitOrder(seller){
  const buyer=document.getElementById('nf-'+seller+'-buyer').value.trim();
  const price=parseFloat(document.getElementById('nf-'+seller+'-price').value)||0;
  const items=document.getElementById('nf-'+seller+'-items').value.trim();
  if(!buyer){toast('Vnesi ime kupca');return;}
  if(!price){toast('Vnesi znesek');return;}
  const id=uid();
  const o={id,seller,buyer,items,price};
  S.orders.push(o);
  toggleForm(seller);render();
  await api('/api/orders',{method:'POST',body:JSON.stringify(o)}).catch(()=>toast('Napaka pri shranjevanju'));
  toast('Dodano — '+buyer);
}

// ─── modal ───
let modalType=null;
function openModal(type){
  modalType=type;
  document.getElementById('modal-title').textContent=type==='cost'?'DODAJ VLOŽEK':'DODAJ ARTIKEL';
  document.getElementById('modal-body').innerHTML=type==='cost'?`
    <div class="modal-field"><div class="modal-label">PRODAJALEC</div>
      <select class="f-input" id="m-seller"><option value="ziga">Žiga</option><option value="aljaz">Aljaž</option></select>
    </div>
    <div class="modal-field"><div class="modal-label">OPIS</div><input class="f-input" id="m-label" placeholder="npr. Zaloga"></div>
    <div class="modal-field"><div class="modal-label">ZNESEK (€)</div><input class="f-input" id="m-amount" type="number" placeholder="0"></div>`:`
    <div class="modal-field"><div class="modal-label">IME ARTIKLA</div><input class="f-input" id="m-name" placeholder="npr. Semax 5mg"></div>
    <div class="modal-field"><div class="modal-label">SKUPAJ (vialet)</div><input class="f-input" id="m-total" type="number" placeholder="10"></div>
    <div class="modal-field"><div class="modal-label">PRODANO</div><input class="f-input" id="m-sold" placeholder="0"></div>
    <div class="modal-field"><div class="modal-label">OSTALO</div><input class="f-input" id="m-left" placeholder="10"></div>`;
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.querySelector('#modal-body .f-input')?.focus(),100);
}
function closeModal(){document.getElementById('overlay').classList.remove('open');modalType=null;}
function closeModalOutside(e){if(e.target===document.getElementById('overlay'))closeModal();}

async function modalConfirm(){
  const id=uid();
  if(modalType==='cost'){
    const seller=document.getElementById('m-seller').value;
    const label=document.getElementById('m-label').value.trim();
    const amount=parseFloat(document.getElementById('m-amount').value)||null;
    if(!label){toast('Vnesi opis');return;}
    const c={id,seller,label,amount};
    S.costs.push(c);render();closeModal();
    await api('/api/costs',{method:'POST',body:JSON.stringify(c)}).catch(()=>toast('Napaka'));
    toast('Vložek dodan');
  } else {
    const name=document.getElementById('m-name').value.trim();
    if(!name){toast('Vnesi ime');return;}
    const s={id,name,total:parseInt(document.getElementById('m-total').value)||0,sold:document.getElementById('m-sold').value||'0',left_amt:document.getElementById('m-left').value||'0'};
    S.stock.push(s);render();closeModal();
    await api('/api/stock',{method:'POST',body:JSON.stringify({...s,left:s.left_amt})}).catch(()=>toast('Napaka'));
    toast('Artikel dodan');
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('overlay').classList.contains('open'))modalConfirm();
  if(e.key==='Escape'&&document.getElementById('overlay').classList.contains('open'))closeModal();
});

loadAll();
</script>
